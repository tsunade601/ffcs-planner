<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCS Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .timetable-grid {
            display: grid;
            grid-template-columns: 60px repeat(5, 1fr);
            gap: 2px;
            background: #1f2937;
            padding: 2px;
        }
        .time-slot { background: #374151; color: #9ca3af; font-size: 0.75rem; }
        .day-header { background: #4f46e5; color: white; font-weight: 600; }
        .cell { min-height: 80px; background: #1f2937; position: relative; }
        .course-card { 
            position: absolute; 
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 8px;
            padding: 6px;
            font-size: 0.8rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">FFCS Planner</h1>
                <p class="text-gray-400">VIT 24BCE - Build your perfect timetable</p>
            </div>
            <div class="flex gap-4">
                <button onclick="exportTimetable()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-xl flex items-center gap-2 transition">
                    <i class="fas fa-download"></i> Export PNG
                </button>
                <button onclick="clearTimetable()" class="px-5 py-2 bg-red-600/80 hover:bg-red-700 rounded-xl flex items-center gap-2 transition">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar -->
            <div class="lg:col-span-4 bg-gray-900 rounded-3xl p-6">
                <div class="mb-6">
                    <input id="searchInput" 
                           onkeyup="filterCourses()" 
                           type="text" 
                           placeholder="Search course code, title or faculty..." 
                           class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-indigo-500">
                </div>

                <div id="courseList" class="max-h-[calc(100vh-280px)] overflow-auto space-y-3 pr-2"></div>
            </div>

            <!-- Timetable -->
            <div class="lg:col-span-8 bg-gray-900 rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Your Timetable</h2>
                    <div id="stats" class="text-sm text-gray-400"></div>
                </div>
                
                <div id="timetable" class="timetable-grid rounded-2xl overflow-hidden"></div>
            </div>
        </div>

        <!-- Selected Courses -->
        <div class="mt-8 bg-gray-900 rounded-3xl p-6">
            <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <i class="fas fa-list"></i> Added Courses
            </h3>
            <div id="selectedCourses" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
