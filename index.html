<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCS Planner • VIT Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .timetable-grid {
            display: grid;
            grid-template-columns: 70px repeat(5, 1fr);
            gap: 2px;
            background: #e5e7eb;
            padding: 2px;
            border-radius: 12px;
            overflow: hidden;
        }
        .course-slot {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            line-height: 1.1;
            text-align: center;
            padding: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .course-slot:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-violet-600 rounded-2xl flex items-center justify-center text-2xl">📅</div>
                    <h1 class="text-5xl font-bold tracking-tight">FFCS Planner</h1>
                </div>
                <p class="text-zinc-400 mt-1">VIT Course Registration • Clash-Free Timetables</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" id="themeBtn" class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm font-medium transition-colors">
                    <span>☀️</span>
                </button>
                <button onclick="resetTimetable()" class="px-6 py-2.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-2xl flex items-center gap-2 text-sm font-medium transition-colors">
                    Reset All
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <!-- Search Sidebar -->
            <div class="xl:col-span-4 bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Find Courses</h2>
                    <span id="resultsCount" class="text-xs bg-zinc-800 px-3 py-1 rounded-full">0 courses</span>
                </div>
                <input id="searchInput" type="text" 
                       class="w-full bg-zinc-800 border border-zinc-700 focus:border-violet-500 rounded-2xl px-5 py-4 text-lg placeholder-zinc-500 focus:outline-none" 
                       placeholder="CSE1001 or Programming or faculty name...">
                <div id="courseList" class="mt-6 space-y-3 max-h-[calc(100vh-280px)] overflow-auto pr-2"></div>
            </div>

            <!-- Timetable Area -->
            <div class="xl:col-span-8 space-y-6">
                <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                        <span>Your Weekly Schedule</span>
                        <span class="text-xs px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-full">5 days</span>
                    </h2>
                    <div id="timetable" class="overflow-x-auto"></div>
                </div>

                <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <div id="addedCourses"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
