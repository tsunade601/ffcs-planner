<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCS Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div class="max-w-7xl mx-auto p-4">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-600">FFCS Planner</h1>
            <div class="flex gap-4">
                <button onclick="toggleDarkMode()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded">🌙</button>
                <button onclick="resetTimetable()" class="px-4 py-2 bg-red-500 text-white rounded">Reset</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar: Course Search -->
            <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
                <h2 class="text-2xl font-semibold mb-4">Course Search</h2>
                <input id="searchInput" type="text" placeholder="Search by code, title, faculty..." 
                       class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700">
                <div id="courseList" class="max-h-[60vh] overflow-auto space-y-2"></div>
            </div>

            <!-- Main Timetable -->
            <div class="lg:col-span-8 bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
                <h2 class="text-2xl font-semibold mb-4">Your Timetable</h2>
                <div id="timetable" class="overflow-auto"></div>
                <div id="addedCourses" class="mt-6"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
