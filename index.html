<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFCS Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }

        .timetable-grid {
            display: grid;
            grid-template-columns: 70px repeat(5, 1fr);
            gap: 3px;
            background: #27272a;
            padding: 4px;
            border-radius: 16px;
        }

        .day-header {
            background: #18181b;
            color: #a1a1aa;
            font-weight: 600;
            padding: 16px 8px;
            text-align: center;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .time-slot {
            background: #18181b;
            color: #71717a;
            padding: 12px 8px;
            font-size: 0.8rem;
            text-align: right;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .cell {
            min-height: 68px;
            background: #1f2937;
            border-radius: 8px;
            padding: 2px;
            transition: background 0.2s;
        }

        .cell:hover {
            background: #374151;
        }

        .course-slot {
            min-height: 64px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .course-slot:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px -4px rgb(0 0 0 / 0.4);
            z-index: 10;
        }

        /* Custom scrollbar */
        #courseList::-webkit-scrollbar {
            width: 6px;
        }
        #courseList::-webkit-scrollbar-track {
            background: transparent;
        }
        #courseList::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 20px;
        }
        #courseList::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* Search focus ring */
        #searchInput:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Smooth transitions */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }
    </style>
<base target="_blank">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 lg:p-6">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-indigo-400 via-violet-400 to-purple-400 bg-clip-text text-transparent">
                    FFCS Planner
                </h1>
                <p class="text-gray-400 text-sm mt-1">VIT Timetable Builder · Plan smarter, register faster</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportTimetable()" class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-xl flex items-center gap-2 transition text-sm font-medium shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-download"></i> Export PNG
                </button>
                <button onclick="clearTimetable()" class="px-4 py-2.5 bg-red-500/20 hover:bg-red-500/30 text-red-300 hover:text-red-200 rounded-xl flex items-center gap-2 transition text-sm font-medium border border-red-500/30">
                    <i class="fas fa-trash-alt"></i> Clear
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar: Course Search -->
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-gray-900 rounded-3xl p-5 border border-gray-800">
                    <div class="mb-4">
                        <label class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-2 block">Search Courses</label>
                        <div class="relative">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input id="searchInput" 
                                   onkeyup="filterCourses()" 
                                   type="text" 
                                   placeholder="Code, title, faculty, slot..." 
                                   class="w-full bg-gray-800 border border-gray-700 rounded-2xl pl-11 pr-5 py-3.5 text-sm focus:outline-none focus:border-indigo-500 transition placeholder-gray-600">
                        </div>
                    </div>
                    <div id="courseList" class="max-h-[calc(100vh-320px)] overflow-auto space-y-2.5 pr-1"></div>
                </div>
            </div>

            <!-- Main: Timetable -->
            <div class="lg:col-span-8 space-y-4">
                <div class="bg-gray-900 rounded-3xl p-5 border border-gray-800">
                    <div class="flex justify-between items-center mb-5">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <i class="fas fa-calendar-alt text-indigo-400"></i> Your Timetable
                        </h2>
                        <div id="stats" class="flex items-center gap-2"></div>
                    </div>

                    <div id="timetable" class="timetable-grid rounded-2xl overflow-hidden"></div>

                    <!-- Legend -->
                    <div class="mt-4 flex flex-wrap gap-3 text-xs text-gray-500">
                        <span><i class="fas fa-info-circle mr-1"></i>Click a course in the list to add it</span>
                        <span class="hidden sm:inline">·</span>
                        <span><i class="fas fa-keyboard mr-1"></i>Ctrl+F to search</span>
                        <span class="hidden sm:inline">·</span>
                        <span><i class="fas fa-shield-alt mr-1"></i>Auto conflict detection</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Selected Courses -->
        <div class="mt-6 bg-gray-900 rounded-3xl p-5 border border-gray-800">
            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fas fa-list-ul text-indigo-400"></i> Added Courses
            </h3>
            <div id="selectedCourses" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
